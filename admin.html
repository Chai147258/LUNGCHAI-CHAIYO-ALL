<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lungchai Chaiyo All - Admin</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
}

header{
    background:#8b0000;
    padding:20px;
}

.container{
    padding:20px;
}

.card{

background:#1f2937;
padding:20px;
border-radius:12px;
margin-bottom:20px;

}


.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;

}


input,select,button{

width:100%;
padding:10px;
margin:5px 0;

}


button{

background:#8b0000;
color:white;
border:0;
cursor:pointer;

}


table{

width:100%;
background:white;
color:black;
border-collapse:collapse;

}


td,th{

padding:10px;
border-bottom:1px solid #ddd;

}


.hidden{

display:none;

}

</style>

</head>


<body>


<header>

<h1>
🛠 Lungchai Chaiyo All
</h1>

<p>
Admin Panel V2
</p>

</header>



<div class="container">


<!-- LOGIN -->

<div id="loginBox" class="card">

<h2>
🔐 Admin Login
</h2>


<input 
id="email"
placeholder="Email">


<input 
id="password"
type="password"
placeholder="Password">


<button onclick="login()">
เข้าสู่ระบบ
</button>


<p id="loginMsg"></p>

</div>




<!-- ADMIN -->

<div id="adminBox" class="hidden">



<div class="grid">


<div class="card">

<h3>
งานใหม่
</h3>

<h1 id="pending">
0
</h1>

</div>


<div class="card">

<h3>
กำลังทำ
</h3>

<h1 id="working">
0
</h1>

</div>


<div class="card">

<h3>
เสร็จแล้ว
</h3>

<h1 id="complete">
0
</h1>

</div>


</div>




<div class="card">


<h2>
📋 งานแจ้งซ่อมล่าสุด
</h2>


<table>


<thead>

<tr>

<th>
เลขงาน
</th>

<th>
ลูกค้า
</th>

<th>
โทร
</th>

<th>
สถานะ
</th>


</tr>

</thead>


<tbody id="jobs">

</tbody>


</table>


</div>





<div class="card">


<h2>
📦 เพิ่มสินค้า
</h2>


<input id="productName"
placeholder="ชื่อสินค้า">


<input id="price"
placeholder="ราคา">


<input id="image"
placeholder="รูป">


<select id="category">

<option value="1">
Computer
</option>

<option value="2">
Network
</option>

<option value="3">
CCTV
</option>

</select>



<button onclick="addProduct()">

เพิ่มสินค้า

</button>


<p id="productMsg"></p>


</div>



</div>


</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>



<script>


async function login(){


const email=
document.getElementById("email").value;


const password=
document.getElementById("password").value;



const {data,error}=

await supabaseClient.auth.signInWithPassword({

email,
password

});



if(error){

loginMsg.innerText=error.message;

return;

}



loginBox.style.display="none";

adminBox.classList.remove("hidden");


loadDashboard();


}




async function loadDashboard(){



const {data,error}=

await supabaseClient

.from("service_requests")

.select("*")

.order("id",{ascending:false})

.limit(20);



if(error){

console.log(error);

return;

}



let pending=0;
let working=0;
let complete=0;



jobs.innerHTML="";



data.forEach(j=>{


if(j.status=="pending")
pending++;


if(j.status=="in_progress")
working++;


if(j.status=="completed")
complete++;



jobs.innerHTML += `

<tr>

<td>${j.request_number}</td>

<td>${j.customer_name}</td>

<td>${j.customer_phone}</td>

<td>${j.status}</td>

</tr>

`;

});



document.getElementById("pending").innerHTML=pending;

document.getElementById("working").innerHTML=working;

document.getElementById("complete").innerHTML=complete;


}





async function addProduct(){



const {error}=

await supabaseClient

.from("products")

.insert([

{

product_name:
productName.value,


sell_price:
Number(price.value),


image_url:
image.value,


category_id:
Number(category.value)

}

]);



if(error){

productMsg.innerHTML=error.message;

return;

}


productMsg.innerHTML="เพิ่มสินค้าแล้ว";


}



</script>


</body>

</html>
