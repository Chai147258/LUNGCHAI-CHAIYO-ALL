<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>ระบบช่างรับงาน | LUNGCHAI CHAIYO ALL</title>
<meta name="description" content="ระบบสำหรับช่าง — เข้าสู่ระบบ ดูงานที่รอรับ รับงาน และอัปเดตสถานะงานซ่อมได้ด้วยตัวเอง">
<link rel="icon" href="images/logo-all.jpg">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  body{background:#0c0c0c;color:#e1e1ed;font-family:'Anuphan',sans-serif;}
  h1,h2,h3,.font-head{font-family:'Space Grotesk',sans-serif;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
  .glass{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);}
  .nebula{position:fixed;inset:0;z-index:-1;pointer-events:none;}
  .nebula div{position:absolute;border-radius:9999px;filter:blur(90px);opacity:.28;}
  input,textarea{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);color:#fff;}
  input:focus,textarea:focus{outline:none;border-color:#b8fc4b;}
  input::placeholder,textarea::placeholder{color:#6b6b76;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .job-card{transition:.2s;}
  .job-card:hover{border-color:rgba(184,252,75,.35);}
</style>
</head>
<body>
<div class="nebula"><div class="w-96 h-96 bg-purple-900 top-10 left-10"></div><div class="w-96 h-96 bg-blue-900 bottom-10 right-10"></div></div>

<header class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
  <div class="max-w-5xl mx-auto px-5 py-3 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <img src="images/logo-all.jpg" class="w-9 h-9 rounded-lg object-cover border border-[#b8fc4b]/40" alt="logo">
      <div>
        <span class="font-head font-bold text-sm text-[#b8fc4b] block leading-tight">LUNGCHAI CHAIYO ALL</span>
        <span class="text-[10px] text-white/40 tracking-widest uppercase">Technician Portal</span>
      </div>
    </a>
    <div id="headerActions" class="flex items-center gap-3"></div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-5 py-10">

  <!-- ============ LOGIN ============ -->
  <section id="loginView" class="max-w-sm mx-auto">
    <div class="text-center mb-6">
      <div class="w-14 h-14 rounded-2xl bg-[#b8fc4b]/10 flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-[#b8fc4b] text-3xl">engineering</span>
      </div>
      <h1 class="font-head text-2xl font-bold text-white mb-1">ระบบช่างรับงาน</h1>
      <p class="text-white/50 text-sm">เข้าสู่ระบบด้วยเบอร์โทรและรหัส PIN ของคุณ</p>
    </div>
    <form id="loginForm" class="glass rounded-2xl p-6 space-y-4">
      <div>
        <label class="text-xs text-white/50 mb-1 block">เบอร์โทรศัพท์</label>
        <input required id="loginPhone" type="tel" class="w-full rounded-xl px-4 py-3 text-sm" placeholder="081-234-5671">
      </div>
      <div>
        <label class="text-xs text-white/50 mb-1 block">รหัส PIN</label>
        <input required id="loginPin" type="password" inputmode="numeric" maxlength="6" class="w-full rounded-xl px-4 py-3 text-sm tracking-widest" placeholder="••••">
      </div>
      <p id="loginError" class="hidden text-xs text-red-400"></p>
      <button type="submit" id="loginBtn" class="w-full bg-[#b8fc4b] text-black font-bold py-3 rounded-xl hover:brightness-95 transition flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">login</span> เข้าสู่ระบบ
      </button>
    </form>
  </section>

  <!-- ============ DASHBOARD ============ -->
  <section id="dashboardView" class="hidden">
    <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
      <div>
        <p class="text-white/40 text-xs">สวัสดี</p>
        <h1 id="techName" class="font-head text-2xl font-bold text-white"></h1>
        <p id="techSkill" class="text-white/40 text-xs mt-1"></p>
      </div>
      <button onclick="loadJobs()" id="refreshBtn" class="glass px-4 py-2 rounded-xl text-xs font-bold text-white/70 hover:text-white flex items-center gap-1.5">
        <span class="material-symbols-outlined text-base">refresh</span> รีเฟรช
      </button>
    </div>

    <div class="mb-8">
      <h2 class="font-head text-sm font-bold text-[#ffcc00] uppercase tracking-widest mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined text-base">inbox</span> งานที่รอรับ (<span id="availCount">0</span>)
      </h2>
      <div id="availableJobs" class="grid sm:grid-cols-2 gap-4"></div>
      <p id="availEmpty" class="hidden text-white/30 text-sm text-center py-8">ยังไม่มีงานใหม่เข้ามาในขณะนี้</p>
    </div>

    <div>
      <h2 class="font-head text-sm font-bold text-[#98cbff] uppercase tracking-widest mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined text-base">construction</span> งานของฉัน (<span id="mineCount">0</span>)
      </h2>
      <div id="myJobs" class="grid sm:grid-cols-2 gap-4"></div>
      <p id="mineEmpty" class="hidden text-white/30 text-sm text-center py-8">คุณยังไม่มีงานที่กำลังดำเนินการ</p>
    </div>
  </section>

</main>

<footer class="text-center text-[11px] text-white/30 py-10">© 2026 LUNGCHAI CHAIYO ALL — ระบบช่างรับงาน</footer>

<script>
const SB_URL = 'https://hkwqrllqzfzsbsxqgaoo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhrd3FybGxxemZ6c2JzeHFnYW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzIzNjAsImV4cCI6MjA5Njk0ODM2MH0.kPT_UY0-2-0cbDlGwya24DnOLJXA-XJGMdM6SIm7Rew';
const STORAGE_KEY = 'lc_tech_session';

async function rpc(fn, body){
  const res = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const t = await res.text();
    let msg = t;
    try{ msg = JSON.parse(t).message || t; }catch(e){}
    throw new Error(msg);
  }
  return res.json();
}

let session = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');

function renderHeaderActions(){
  const el = document.getElementById('headerActions');
  if(session){
    el.innerHTML = `<button onclick="logout()" class="text-xs text-white/50 hover:text-red-400 flex items-center gap-1"><span class="material-symbols-outlined text-base">logout</span> ออกจากระบบ</button>`;
  }else{
    el.innerHTML = `<a href="index.html" class="text-xs text-white/60 hover:text-[#b8fc4b] flex items-center gap-1"><span class="material-symbols-outlined text-base">arrow_back</span> หน้าแรก</a>`;
  }
}

function showDashboard(){
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('dashboardView').classList.remove('hidden');
  document.getElementById('techName').textContent = session.full_name;
  document.getElementById('techSkill').textContent = session.skill || '';
  renderHeaderActions();
  loadJobs();
}

function showLogin(){
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('dashboardView').classList.add('hidden');
  renderHeaderActions();
}

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined spin">progress_activity</span> กำลังเข้าสู่ระบบ...';
  try{
    const phone = document.getElementById('loginPhone').value.trim();
    const pin = document.getElementById('loginPin').value.trim();
    const rows = await rpc('technician_login', { p_phone: phone, p_pin: pin });
    if(!rows || rows.length === 0){
      errEl.textContent = 'เบอร์โทรหรือ PIN ไม่ถูกต้อง กรุณาลองใหม่';
      errEl.classList.remove('hidden');
      return;
    }
    session = {
      token: rows[0].session_token,
      technician_id: rows[0].technician_id,
      full_name: rows[0].full_name,
      skill: rows[0].skill
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
    showDashboard();
  }catch(err){
    errEl.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
    errEl.classList.remove('hidden');
  }finally{
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">login</span> เข้าสู่ระบบ';
  }
});

async function logout(){
  try{ await rpc('technician_logout', { p_token: session.token }); }catch(e){}
  localStorage.removeItem(STORAGE_KEY);
  session = null;
  document.getElementById('loginForm').reset();
  showLogin();
}

const STATUS_LABEL = {
  pending:'รอดำเนินการ', accepted:'รับงานแล้ว', in_progress:'กำลังดำเนินการ',
  completed:'เสร็จสิ้น', cancelled:'ยกเลิก'
};

function jobCard(job, bucket){
  const expressTag = job.is_express ? `<span class="text-[10px] px-2 py-0.5 rounded-full bg-red-500/20 text-red-400 font-bold">ด่วน</span>` : '';
  let actions = '';
  if(bucket === 'available'){
    actions = `<button onclick="acceptJob(${job.id})" class="w-full bg-[#b8fc4b] text-black text-xs font-bold py-2.5 rounded-xl hover:brightness-95 transition flex items-center justify-center gap-1.5">
      <span class="material-symbols-outlined text-base">check_circle</span> รับงานนี้
    </button>`;
  } else {
    if(job.status === 'accepted'){
      actions = `<button onclick="updateStatus(${job.id},'in_progress')" class="w-full bg-[#98cbff] text-black text-xs font-bold py-2.5 rounded-xl hover:brightness-95 transition flex items-center justify-center gap-1.5">
        <span class="material-symbols-outlined text-base">play_arrow</span> เริ่มดำเนินการ
      </button>`;
    } else if(job.status === 'in_progress'){
      actions = `<div class="flex gap-2">
        <button onclick="promptComplete(${job.id})" class="flex-1 bg-[#b8fc4b] text-black text-xs font-bold py-2.5 rounded-xl hover:brightness-95 transition flex items-center justify-center gap-1.5">
          <span class="material-symbols-outlined text-base">task_alt</span> เสร็จสิ้น
        </button>
        <button onclick="promptCancel(${job.id})" class="px-3 bg-white/10 text-white/60 text-xs font-bold py-2.5 rounded-xl hover:bg-red-500/20 hover:text-red-400 transition">
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      </div>`;
    }
  }
  return `
    <div class="job-card glass rounded-2xl p-5 border border-white/10">
      <div class="flex items-start justify-between mb-2">
        <span class="font-head font-bold text-[#ffcc00] text-sm">${job.request_number}</span>
        ${expressTag}
      </div>
      <p class="text-white font-bold text-sm mb-1">${job.service_name || job.device_type || 'งานซ่อมทั่วไป'}</p>
      <p class="text-white/50 text-xs mb-3 line-clamp-2">${job.note || ''}</p>
      <div class="space-y-1 mb-4 text-xs text-white/40">
        <p class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">person</span> ${job.customer_name || '-'} · ${job.phone || '-'}</p>
        ${job.address ? `<p class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">location_on</span> ${job.address}</p>` : ''}
        <p class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">schedule</span> ${new Date(job.created_at).toLocaleString('th-TH')}</p>
      </div>
      ${bucket === 'mine' ? `<p class="text-[10px] text-white/30 mb-2 uppercase tracking-wider">สถานะ: ${STATUS_LABEL[job.status]||job.status}</p>` : ''}
      ${actions}
    </div>
  `;
}

async function loadJobs(){
  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.querySelector('.material-symbols-outlined').classList.add('spin');
  try{
    const rows = await rpc('technician_get_jobs', { p_token: session.token });
    const available = rows.filter(r => r.bucket === 'available');
    const mine = rows.filter(r => r.bucket === 'mine');

    document.getElementById('availCount').textContent = available.length;
    document.getElementById('mineCount').textContent = mine.length;
    document.getElementById('availableJobs').innerHTML = available.map(j => jobCard(j,'available')).join('');
    document.getElementById('myJobs').innerHTML = mine.map(j => jobCard(j,'mine')).join('');
    document.getElementById('availEmpty').classList.toggle('hidden', available.length > 0);
    document.getElementById('mineEmpty').classList.toggle('hidden', mine.length > 0);
  }catch(err){
    if(String(err.message).includes('invalid or expired session')){
      alert('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่');
      logout();
    }else{
      alert('โหลดข้อมูลไม่สำเร็จ: ' + err.message);
    }
  }finally{
    refreshBtn.querySelector('.material-symbols-outlined').classList.remove('spin');
  }
}

async function acceptJob(id){
  try{
    const ok = await rpc('technician_accept_job', { p_token: session.token, p_request_id: id });
    if(!ok){ alert('งานนี้ถูกช่างท่านอื่นรับไปแล้ว'); }
    loadJobs();
  }catch(err){ alert('รับงานไม่สำเร็จ: ' + err.message); }
}

async function updateStatus(id, status, note){
  try{
    await rpc('technician_update_status', { p_token: session.token, p_request_id: id, p_status: status, p_note: note || null });
    loadJobs();
  }catch(err){ alert('อัปเดตสถานะไม่สำเร็จ: ' + err.message); }
}

function promptComplete(id){
  const note = prompt('บันทึกสรุปงาน (ถ้ามี) ก่อนปิดงาน:', '');
  if(note !== null) updateStatus(id, 'completed', note);
}
function promptCancel(id){
  const note = prompt('เหตุผลที่ยกเลิกงานนี้:', '');
  if(note !== null) updateStatus(id, 'cancelled', note);
}

// Boot
renderHeaderActions();
if(session){ showDashboard(); } else { showLogin(); }
</script>
<script src="/assets/lungchai-launcher.js" defer></script>
</body>
</html>
