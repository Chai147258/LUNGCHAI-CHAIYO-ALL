<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>คุยกับ ลุงชัย AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="chat-container">

    <div class="header">
        คุยกับ "ลุงชัย AI"
    </div>


    <div id="chat-box" class="chat-box">

        <div class="message ai">
            สวัสดีครับ ผมคือลุงชัย AI<br>
            มีอะไรให้ช่วยครับ
        </div>

    </div>


    <div class="input-area">

        <button id="mic-btn">
            🎤
        </button>


        <input 
            id="user-input"
            type="text"
            placeholder="พิมพ์ข้อความ..."
        >


        <button id="send-btn">
            ส่ง
        </button>

    </div>


</div>


<script src="app.js"></script>

</body>
</html>
