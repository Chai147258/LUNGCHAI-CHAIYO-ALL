<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>โปรไฟล์ช่าง | LUNGCHAI CHAIYO ALL</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f7fa;
    margin:0;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 3px 10px #ddd;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

h2{
    margin-bottom:5px;
}

.rating{
    color:#ff9800;
    font-size:20px;
}

.skill span{
    display:inline-block;
    background:#e8f5e9;
    padding:6px 10px;
    border-radius:20px;
    margin:3px;
}

.slot{
    display:inline-block;
    background:#4caf50;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    margin:5px;
    cursor:pointer;
}

.slot.disabled{
    background:#aaa;
}

button{

    width:100%;
    padding:15px;
    border:0;
    border-radius:10px;
    background:#0066ff;
    color:white;
    font-size:18px;
    cursor:pointer;

}

</style>

</head>


<body>


<div class="container">


<div class="card" id="profile">
กำลังโหลดข้อมูล...
</div>


<div class="card">

<h3>
เวลารับงาน
</h3>

<div id="slots">
กำลังโหลด Slot...
</div>

</div>

<div class="card">

<h3>
รีวิวลูกค้า
</h3>

<div id="reviews">
กำลังโหลดรีวิว...
</div>

</div>

<button onclick="booking()">
จองช่าง
</button>


</div>



<script>


const SUPABASE_URL =
"YOUR_SUPABASE_URL";


const SUPABASE_KEY =
"YOUR_SUPABASE_ANON_KEY";


const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



let technician_id=null;
let selectedSlot=null;



async function loadProfile(){


technician_id =
new URLSearchParams(
window.location.search
).get("id");


const {data,error}=

await supabaseClient
.from(
"technician_public_profile"
)
.select("*")
.eq(
"technician_uuid",
technician_id
)
.single();



if(error){

document.getElementById("profile")
.innerHTML=
"ไม่พบข้อมูลช่าง";

return;

}



document.getElementById("profile")
.innerHTML=`

<img class="avatar"
src="${data.photo_url || '/images/default-tech.png'}">


<h2>
${data.full_name}
</h2>


<p>
${data.business_name || ''}
</p>


<div class="rating">
⭐ ${data.avg_rating}
</div>


<p>
รีวิว ${data.total_reviews} รายการ
</p>


<p>
งานสำเร็จ ${data.completed_jobs} งาน
</p>


<p>
📍 รับงานรัศมี 
${data.service_radius_km}
กม.
</p>


<div class="skill">

${data.skill || ''}

</div>

`;



loadSlots();

}




async function loadSlots(){


const {data,error}=

await supabaseClient
.from(
"appointment_slots"
)
.select("*")
.eq(
"technician_uuid",
technician_id
)
.eq(
"status",
"available"
)
.order(
"work_date"
);



if(error){

return;

}


let html="";


data.forEach(slot=>{


html +=`

<div class="slot"
onclick="
selectSlot(
'${slot.id}',
'${slot.work_date}',
'${slot.slot_time}'
)
">

${slot.work_date}
<br>
${slot.slot_time}

</div>

`;

});


document.getElementById("slots")
.innerHTML=html || "ไม่มีเวลาว่าง";

}



function selectSlot(
id,
date,
time
){


selectedSlot={

id:id,
date:date,
time:time

};


alert(
"เลือกเวลา "+date+" "+time
);


}



function booking(){


if(!selectedSlot){

alert(
"กรุณาเลือกเวลานัดหมาย"
);

return;

}



window.location.href=

`/booking/index.html?
technician_uuid=${technician_id}
&work_date=${selectedSlot.date}
&slot_time=${selectedSlot.time}`;


}



loadProfile();


</script>


</body>
</html>
