<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="แคตตาล็อกสินค้า ลุงชัย ไชโย ออล — 320+ รายการ IT, เครือข่าย, อุตสาหกรรม, PPE, ของฝาก OTOP, แฟชั่น">
<title>แคตตาล็อกสินค้า | ลุงชัย ไชโย ออล</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Chakra+Petch:wght@300;400;600;700&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-hi:#FFE566;--gold-dim:#6B5018;
  --void:#02020C;--deep:#04041A;--card:#0A0A2E;
  --steel:#8888BB;--cream:#E0DCF0;--white:#fff;
  --ft:'Sarabun',sans-serif;--fc:'Chakra Petch',sans-serif;--fm:'Space Mono',monospace;--fd:'Playfair Display',serif;
  --t:0.28s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ft);background:var(--void);color:var(--cream);overflow-x:hidden;min-height:100vh}
a{color:inherit;text-decoration:none}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(2,2,12,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,.12);padding:.8rem 0}
.nav-inner{max-width:1300px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.nav-brand{display:flex;align-items:center;gap:.6rem}
.nav-logo{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;box-shadow:0 0 10px rgba(201,168,76,.4)}
.nav-name{font-family:var(--fc);font-size:.85rem;font-weight:700;color:var(--gold);letter-spacing:.04em;line-height:1.1}
.nav-name span{display:block;font-size:.6rem;font-weight:300;color:var(--steel);letter-spacing:.1em}
.nav-links{display:flex;align-items:center;gap:1.3rem}
.nav-links a{font-family:var(--fc);font-size:.75rem;font-weight:600;letter-spacing:.05em;color:var(--steel);transition:color var(--t)}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.nav-cta{background:linear-gradient(135deg,var(--gold),var(--gold-hi));color:var(--void)!important;padding:.42rem 1rem;border-radius:20px;font-weight:700!important;box-shadow:0 0 12px rgba(201,168,76,.4)}

/* HEADER */
.ph{padding:6.5rem 0 2.5rem;position:relative;z-index:1;text-align:center;border-bottom:1px solid rgba(201,168,76,.08)}
.ph::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(50,25,150,.2) 0%,transparent 70%);pointer-events:none}
.ph-lbl{font-family:var(--fm);font-size:.65rem;letter-spacing:.22em;color:var(--gold);margin-bottom:.6rem;display:flex;align-items:center;justify-content:center;gap:.6rem}
.ph-lbl::before,.ph-lbl::after{content:'';display:block;width:22px;height:1px;background:var(--gold)}
.ph-h1{font-family:var(--fd);font-size:clamp(1.6rem,4vw,2.6rem);font-weight:900;color:var(--white);margin-bottom:.4rem}
.ph-h1 span{color:var(--gold)}
.ph-desc{color:var(--steel);font-size:.9rem}
.ph-count{font-family:var(--fm);font-size:.7rem;color:var(--gold);margin-top:.5rem;letter-spacing:.05em}

/* LAYOUT */
.wrap{display:grid;grid-template-columns:250px 1fr;gap:2rem;max-width:1300px;margin:0 auto;padding:2.5rem 1.5rem;position:relative;z-index:1}

/* SIDEBAR */
.side{position:sticky;top:5.5rem;height:fit-content;max-height:calc(100vh - 6rem);overflow-y:auto}
.side::-webkit-scrollbar{width:4px}
.side::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}
.side-sec{margin-bottom:1.5rem}
.side-t{font-family:var(--fm);font-size:.62rem;letter-spacing:.16em;color:var(--gold);margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:1px solid rgba(201,168,76,.15)}
.grp-btn{background:none;border:1px solid transparent;width:100%;text-align:left;padding:.55rem .75rem;border-radius:6px;font-family:var(--ft);font-size:.84rem;color:var(--steel);cursor:pointer;transition:all var(--t);display:flex;align-items:center;gap:.5rem;margin-bottom:.2rem}
.grp-btn:hover{color:var(--cream);background:rgba(201,168,76,.06)}
.grp-btn.active{color:var(--gold);background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.25);font-weight:600}
.grp-count{margin-left:auto;font-family:var(--fm);font-size:.58rem;background:rgba(201,168,76,.15);color:var(--gold);padding:.1rem .4rem;border-radius:10px}

/* Sub-cat pills (shown when group selected) */
.subcats{display:none;flex-wrap:wrap;gap:.3rem;margin-top:.5rem;padding-left:.3rem}
.subcats.show{display:flex}
.subcat-pill{
  font-family:var(--fm);font-size:.6rem;padding:.25rem .55rem;border-radius:10px;
  background:rgba(255,255,255,.04);color:var(--steel);cursor:pointer;
  border:1px solid rgba(255,255,255,.06);transition:all var(--t);
}
.subcat-pill:hover{color:var(--cream)}
.subcat-pill.active{background:var(--gold);color:var(--void);border-color:var(--gold)}

/* SEARCH */
.search-row{display:flex;gap:.7rem;margin-bottom:1.25rem;flex-wrap:wrap}
.search-in{flex:1;min-width:200px;background:var(--card);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:.7rem 1rem;color:var(--cream);font-family:var(--ft);font-size:.9rem;outline:none;transition:border-color var(--t)}
.search-in:focus{border-color:var(--gold)}
.search-in::placeholder{color:var(--steel)}
.sort-sel{background:var(--card);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:.7rem .9rem;color:var(--cream);font-family:var(--fc);font-size:.76rem;cursor:pointer}
.sort-sel option{background:var(--deep)}
.res-info{font-family:var(--fm);font-size:.66rem;color:var(--steel);letter-spacing:.05em;margin-bottom:1.1rem}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1.1rem}
.card{background:var(--card);border:1px solid rgba(201,168,76,.1);border-radius:12px;overflow:hidden;transition:all var(--t);position:relative;cursor:pointer}
.card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,.45),0 0 20px rgba(201,168,76,.08)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transition:transform var(--t);transform-origin:left}
.card:hover::before{transform:scaleX(1)}
.c-img{aspect-ratio:1;background:var(--deep);display:flex;align-items:center;justify-content:center;font-size:2.6rem}
.c-body{padding:.85rem .95rem 1rem}
.c-cat{font-family:var(--fm);font-size:.56rem;letter-spacing:.06em;color:var(--gold-dim);margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-name{font-family:var(--fc);font-size:.82rem;font-weight:700;color:var(--white);margin-bottom:.55rem;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.3em}
.c-foot{display:flex;align-items:center;justify-content:space-between;gap:.4rem}
.c-price{font-family:var(--fc);font-size:.92rem;font-weight:700;color:var(--gold)}
.c-btn{background:var(--gold);color:var(--void);border:none;border-radius:5px;padding:.35rem .7rem;font-family:var(--fc);font-size:.65rem;font-weight:700;letter-spacing:.03em;cursor:pointer;transition:all var(--t);white-space:nowrap}
.c-btn:hover{background:var(--gold-hi);transform:translateY(-1px)}

.empty{grid-column:1/-1;text-align:center;padding:3.5rem 1rem;color:var(--steel)}
.empty-icon{font-size:2.8rem;margin-bottom:.85rem;opacity:.4}
.empty-txt{font-family:var(--fc);font-size:.85rem;letter-spacing:.04em}

/* PAGINATION */
.pager{display:flex;justify-content:center;gap:.4rem;margin-top:2.2rem;flex-wrap:wrap}
.pg-btn{
  min-width:36px;height:36px;padding:0 .5rem;
  background:var(--card);border:1px solid rgba(201,168,76,.15);border-radius:6px;
  color:var(--steel);font-family:var(--fm);font-size:.75rem;cursor:pointer;transition:all var(--t);
  display:flex;align-items:center;justify-content:center;
}
.pg-btn:hover{border-color:var(--gold);color:var(--gold)}
.pg-btn.active{background:var(--gold);color:var(--void);border-color:var(--gold);font-weight:700}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(2,2,12,.85);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-ov.open{display:flex}
.modal{background:var(--card);border:1px solid rgba(201,168,76,.2);border-radius:16px;width:100%;max-width:440px;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.m-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--steel);font-size:1.4rem;cursor:pointer;z-index:1}
.m-close:hover{color:var(--gold)}
.m-img{aspect-ratio:16/9;background:var(--deep);display:flex;align-items:center;justify-content:center;font-size:4.5rem;border-radius:16px 16px 0 0}
.m-body{padding:1.6rem}
.m-cat{font-family:var(--fm);font-size:.6rem;letter-spacing:.1em;color:var(--gold);margin-bottom:.4rem}
.m-name{font-family:var(--fc);font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:1rem;line-height:1.3}
.m-price{font-family:var(--fc);font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:1.25rem}
.m-actions{display:flex;gap:.7rem}
.m-line{flex:1;background:rgba(0,185,10,.15);color:#00B90A;border:1px solid rgba(0,185,10,.35);border-radius:6px;padding:.75rem;font-family:var(--fc);font-size:.78rem;font-weight:700;cursor:pointer;transition:all var(--t)}
.m-line:hover{background:#00B90A;color:var(--void)}
.m-wa{flex:1;background:rgba(37,211,102,.15);color:#25D366;border:1px solid rgba(37,211,102,.35);border-radius:6px;padding:.75rem;font-family:var(--fc);font-size:.78rem;font-weight:700;cursor:pointer;transition:all var(--t)}
.m-wa:hover{background:#25D366;color:var(--void)}

@media(max-width:900px){.wrap{grid-template-columns:1fr}.side{position:static;max-height:none}.side-sec:first-child{overflow-x:auto}}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.search-row{flex-direction:column}}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
</style>
</head>

// ── CANVAS ──
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let W,H,stars=[];
  function r(){W=c.width=innerWidth;H=c.height=innerHeight;stars=[];
    for(let i=0;i<250;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,a:Math.random(),da:(Math.random()-.5)*.005,gold:Math.random()>.8});}
  function d(){ctx.clearRect(0,0,W,H);
    [[.15,.25,'40,25,180',.16],[.8,.6,'90,15,160',.12],[.5,.5,'0,70,200',.08]].forEach(([cx,cy,col,a])=>{
      const g=ctx.createRadialGradient(cx*W,cy*H,0,cx*W,cy*H,Math.max(W,H)*.4);
      g.addColorStop(0,`rgba(${col},${a})`);g.addColorStop(1,`rgba(${col},0)`);
      ctx.beginPath();ctx.arc(cx*W,cy*H,Math.max(W,H)*.4,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});
    stars.forEach(s=>{s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.gold?`rgba(201,168,76,${s.a*.75})`:`rgba(200,210,255,${s.a*.55})`;ctx.fill();});
    requestAnimationFrame(d);}
  addEventListener('resize',r);r();d();
})();

// ── STATE ──
let activeGroup = 'all';
let activeSub = 'all';
let currentPage = 1;
const PER_PAGE = 24;

// Category label lookup (id -> label from first product)
const CAT_LABEL = {};
PRODUCTS.forEach(p => { CAT_LABEL[p.cat] = p.catName; });

document.getElementById('ph-count').textContent = `รวม ${PRODUCTS.length} รายการสินค้า`;

// ── RENDER GROUP SIDEBAR ──
function renderGroups(){
  const list = document.getElementById('grp-list');
  const total = PRODUCTS.length;
  let html = `<button class="grp-btn ${activeGroup==='all'?'active':''}" onclick="setGroup('all')">
    🏠 ทั้งหมด <span class="grp-count">${total}</span>
  </button>`;

  Object.entries(GROUPS).forEach(([gid, info]) => {
    const count = PRODUCTS.filter(p => p.group === gid).length;
    if (!count) return;
    html += `<button class="grp-btn ${activeGroup===gid?'active':''}" onclick="setGroup('${gid}')">
      ${info.label} <span class="grp-count">${count}</span>
    </button>`;
    if (activeGroup === gid) {
      const cats = [...new Set(PRODUCTS.filter(p=>p.group===gid).map(p=>p.cat))];
      html += `<div class="subcats show">
        <span class="subcat-pill ${activeSub==='all'?'active':''}" onclick="setSub('all')">ทั้งหมด</span>
        ${cats.map(c => `<span class="subcat-pill ${activeSub===c?'active':''}" onclick="setSub('${c}')">${CAT_LABEL[c]}</span>`).join('')}
      </div>`;
    }
  });
  list.innerHTML = html;
}

function setGroup(gid){
  activeGroup = gid;
  activeSub = 'all';
  currentPage = 1;
  renderGroups();
  render();
}
function setSub(cid){
  activeSub = cid;
  currentPage = 1;
  renderGroups();
  render();
}

// ── FILTER + SORT + PAGINATE ──
function render(){
  const q = document.getElementById('q').value.toLowerCase().trim();
  const sort = document.getElementById('sort').value;

  let list = PRODUCTS.filter(p => {
    const mGroup = activeGroup==='all' || p.group===activeGroup;
    const mSub   = activeSub==='all' || p.cat===activeSub;
    const mQ     = !q || p.name.toLowerCase().includes(q) || p.catName.toLowerCase().includes(q);
    return mGroup && mSub && mQ;
  });

  if(sort==='name-asc')  list.sort((a,b)=>a.name.localeCompare(b.name,'th'));
  if(sort==='name-desc') list.sort((a,b)=>b.name.localeCompare(a.name,'th'));
  if(sort==='price-asc') list.sort((a,b)=>a.price-b.price);
  if(sort==='price-desc')list.sort((a,b)=>b.price-a.price);

  document.getElementById('res-info').textContent = `พบ ${list.length} รายการ${q?' สำหรับ "'+q+'"':''}`;

  // Pagination
  const totalPages = Math.max(1, Math.ceil(list.length / PER_PAGE));
  if(currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage-1)*PER_PAGE;
  const pageItems = list.slice(start, start+PER_PAGE);

  const grid = document.getElementById('grid');
  if(!pageItems.length){
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">ไม่พบสินค้าที่ค้นหา</div></div>`;
  } else {
    grid.innerHTML = pageItems.map(p => `
      <div class="card" onclick="openModal(${p.id})">
        <div class="c-img"><span>${p.icon}</span></div>
        <div class="c-body">
          <div class="c-cat">${p.catName}</div>
          <div class="c-name">${p.name}</div>
          <div class="c-foot">
            <div class="c-price">฿${p.price.toLocaleString()}</div>
            <button class="c-btn" onclick="event.stopPropagation();inquire('${p.name.replace(/'/g,"\\'")}',${p.price})">สอบถาม</button>
          </div>
        </div>
      </div>`).join('');
  }

  renderPager(totalPages);
}

function renderPager(totalPages){
  const pager = document.getElementById('pager');
  if(totalPages<=1){ pager.innerHTML=''; return; }
  let html = `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

  const maxShow = 7;
  let pages = [];
  if(totalPages <= maxShow){
    pages = Array.from({length:totalPages},(_,i)=>i+1);
  } else {
    pages = [1];
    let s = Math.max(2, currentPage-1), e = Math.min(totalPages-1, currentPage+1);
    if(s>2) pages.push('...');
    for(let i=s;i<=e;i++) pages.push(i);
    if(e<totalPages-1) pages.push('...');
    pages.push(totalPages);
  }
  pages.forEach(p=>{
    if(p==='...') html += `<span style="color:var(--steel);padding:0 .3rem">…</span>`;
    else html += `<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pager.innerHTML = html;
}

function goPage(p){
  currentPage = p;
  render();
  window.scrollTo({top: document.querySelector('.wrap').offsetTop - 80, behavior:'smooth'});
}

// ── MODAL ──
function openModal(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('modal-c').innerHTML = `
    <button class="m-close" onclick="closeModal()">✕</button>
    <div class="m-img"><span>${p.icon}</span></div>
    <div class="m-body">
      <div class="m-cat">${p.catName}</div>
      <div class="m-name">${p.name}</div>
      <div class="m-price">฿${p.price.toLocaleString()}</div>
      <div class="m-actions">
        <button class="m-line" onclick="inquire('${p.name.replace(/'/g,"\\'")}',${p.price},'line')">💬 LINE OA</button>
        <button class="m-wa" onclick="inquire('${p.name.replace(/'/g,"\\'")}',${p.price},'wa')">📱 WhatsApp</button>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function inquire(name, price, ch='line'){
  const urls = { line:'https://line.me/R/ti/p/@971yzyyd', wa:'https://wa.me/qr/QXD7536TVAPHG1' };
  window.open(urls[ch]||urls.line, '_blank');
}
